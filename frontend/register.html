<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>註冊 — AdaptLearn</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body style="background:var(--color-gray);min-height:100vh">

  <nav class="navbar" style="background:var(--color-white)">
    <div class="navbar-logo"><a href="index.html"><span>AL</span> AdaptLearn</a></div>
    <ul class="navbar-links">
      <li><a href="index.html">首頁</a></li>
      <li><a href="courses.html">課程</a></li>
    </ul>
    <div class="navbar-right"></div>
  </nav>

  <div class="form-card" style="max-width:500px">
    <div class="form-title">建立帳號</div>
    <div class="form-subtitle">開始你的程式設計學習旅程</div>

    <form id="register-form">
      <div class="form-group">
        <label class="form-label" for="username">帳號</label>
        <input class="form-input" type="text" id="username" placeholder="4~20 個字元" required />
        <div class="form-error" id="err-username"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">電子郵件</label>
        <input class="form-input" type="email" id="email" placeholder="example@mail.com" required />
        <div class="form-error" id="err-email"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="student_id">學號（選填）</label>
        <input class="form-input" type="text" id="student_id" placeholder="學號" />
      </div>
      <div class="form-group">
        <label class="form-label" for="gender">性別（選填）</label>
        <select class="form-input" id="gender">
          <option value="">不願透露</option>
          <option value="male">男</option>
          <option value="female">女</option>
          <option value="other">其他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">密碼</label>
        <input class="form-input" type="password" id="password" placeholder="至少 8 個字元" required />
        <div class="form-error" id="err-password"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="password2">確認密碼</label>
        <input class="form-input" type="password" id="password2" placeholder="再輸入一次密碼" required />
        <div class="form-error" id="err-password2"></div>
      </div>
      <div class="form-error" id="err-general" style="margin-bottom:12px"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" id="submit-btn">
        建立帳號
      </button>
    </form>

    <div class="form-footer">
      已有帳號？<a href="login.html">立即登入</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    if (localStorage.getItem('access_token')) {
      window.location.href = '/';
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      // 清除舊錯誤
      document.querySelectorAll('.form-error').forEach(el => el.style.display = 'none');

      const p1 = document.getElementById('password').value;
      const p2 = document.getElementById('password2').value;
      if (p1 !== p2) {
        const el = document.getElementById('err-password2');
        el.textContent = '兩次密碼不一致';
        el.style.display = 'block';
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.textContent = '建立中...';
      btn.disabled = true;

      const { ok, data } = await AuthAPI.register({
        username: document.getElementById('username').value.trim(),
        email:    document.getElementById('email').value.trim(),
        student_id: document.getElementById('student_id').value.trim(),
        gender: document.getElementById('gender').value,
        password: p1,
        password2: p2,
        role: 'student',
      });

      if (ok) {
        showToast('註冊成功！正在為你登入...');
        const { ok: loginOk } = await AuthAPI.login(
          document.getElementById('username').value.trim(), p1
        );
        if (loginOk) setTimeout(() => window.location.href = '/', 800);
      } else {
        // 顯示欄位錯誤
        Object.entries(data).forEach(([field, msgs]) => {
          const el = document.getElementById(`err-${field}`);
          if (el) { el.textContent = Array.isArray(msgs) ? msgs[0] : msgs; el.style.display = 'block'; }
          else {
            const gen = document.getElementById('err-general');
            gen.textContent = Array.isArray(msgs) ? msgs[0] : msgs;
            gen.style.display = 'block';
          }
        });
        btn.textContent = '建立帳號';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
