<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>學習中心 — AdaptLearn</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-logo"><a href="/"><span>AL</span> AdaptLearn</a></div>
    <ul class="navbar-links"></ul>
    <div class="navbar-right" id="nav-right" style="display:none"></div>
  </nav>

  <div class="dashboard-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div style="font-size:1.1rem;font-weight:800;color:var(--color-white)">學習中心</div>
      <div style="font-size:0.8rem;color:#666;margin-top:4px" id="user-greeting">你好</div>
      <ul class="sidebar-nav">
        <li><a href="#overview" class="active">📊 學習總覽</a></li>
        <li><a href="#recommendations">✨ 適性推薦</a></li>
        <li><a href="#performance">📈 學習表現</a></li>
        <li id="admin-dashboard-link" style="display:none"><a href="admin-dashboard.html">🧭 管理總覽</a></li>
      </ul>
      <div style="margin-top:auto;padding-top:32px">
        <div style="border:1px solid #2f2f2f;border-radius:var(--radius-md);padding:14px 16px;margin-bottom:14px">
          <div style="font-size:0.72rem;color:#777;font-weight:800;margin-bottom:8px">目前登入</div>
          <div id="account-name" style="font-size:0.95rem;font-weight:800;color:#fff">-</div>
          <div id="account-role" style="font-size:0.8rem;color:var(--color-lime);margin-top:2px">-</div>
          <div id="account-email" style="font-size:0.75rem;color:#888;margin-top:6px;word-break:break-all">-</div>
        </div>
        <a href="profile.html" class="btn btn-outline" style="width:100%;color:#fff;border-color:#333;justify-content:center;margin-bottom:10px">
          編輯個人資訊
        </a>
        <button class="btn btn-outline" style="width:100%;color:#fff;border-color:#333;justify-content:center"
          onclick="AuthAPI.logout()">登出</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">

      <!-- Overview -->
      <section id="overview">
        <div class="page-title">學習總覽</div>
        <div class="page-subtitle" id="user-name">歡迎回來！</div>

        <div class="stats-row">
          <div class="stat-card lime">
            <div class="stat-number" id="stat-enrolled">—</div>
            <div class="stat-label">完成單元</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="stat-completed">— / 8</div>
            <div class="stat-label">學習進度</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="stat-score">—</div>
            <div class="stat-label">平均評量分數</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="stat-recommend">—</div>
            <div class="stat-label">待查看推薦</div>
          </div>
        </div>
      </section>

      <!-- Learning Path -->
      <section id="my-courses" style="margin-top:40px">
        <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:16px">學習路徑</h2>
        <div id="unit-path-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px">
          <p style="color:#aaa">載入中...</p>
        </div>
      </section>

      <!-- Recommendations -->
      <section id="recommendations" style="margin-top:40px">
        <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:16px">✨ 適性推薦</h2>
        <div id="recommendations-list">
          <p style="color:#aaa">載入中...</p>
        </div>
      </section>

      <!-- Performance -->
      <section id="performance" style="margin-top:40px">
        <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:16px">📈 學習表現</h2>
        <div id="performance-list"><p style="color:#aaa">載入中...</p></div>
      </section>

    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    if (!localStorage.getItem('access_token')) {
      window.location.replace('/login.html');
    }

    function renderPerformance(units, canSeeLevels = false) {
      const performanceUnits = units.map(u => ({
        ...u,
        performance_score: u.best_score ?? u.last_score,
      }));
      const attempted = performanceUnits.filter(u => u.performance_score != null);
      const perfList = document.getElementById('performance-list');

      if (!attempted.length) {
        perfList.innerHTML = '<p style="color:#aaa">完成評量後將顯示學習表現</p>';
        document.getElementById('stat-score').textContent = '—';
        return;
      }

      const avg = (attempted.reduce((s, u) => s + u.performance_score, 0) / attempted.length).toFixed(1);
      document.getElementById('stat-score').textContent = avg;

      const best  = attempted.reduce((a, b) => a.performance_score >= b.performance_score ? a : b);
      const worst = attempted.reduce((a, b) => a.performance_score <= b.performance_score ? a : b);

      const lvlStroke = { 1: '#ff6b6b', 2: '#a8d800', 3: '#4a90d9' };
      const lvlBg     = { 1: '#ffcccc', 2: 'var(--color-lime)', 3: '#b3d9ff' };

      const barRows = performanceUnits.map(u => {
        const s = u.performance_score;
        const pct = s != null ? Math.round(s) : 0;
        const textColor = s != null ? 'var(--color-black)' : '#666';
        const badge = canSeeLevels && s != null
          ? `<span style="font-size:0.62rem;font-weight:700;padding:1px 6px;border-radius:10px;background:${lvlBg[u.current_level]};margin-left:4px">L${u.current_level}</span>`
          : '';
        return `
          <div style="margin-bottom:11px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
              <div style="font-size:0.78rem;font-weight:700;color:${textColor}">
                Unit ${u.unit_number} ${u.unit_title}${badge}
              </div>
              <span style="font-size:0.78rem;font-weight:700;color:${textColor};flex-shrink:0;margin-left:8px">
                ${s != null ? Math.round(s) + ' 分' : '未測驗'}
              </span>
            </div>
            <div style="background:#2a2a2a;border-radius:6px;height:8px;overflow:hidden">
              <div style="width:${pct}%;height:100%;background:${s != null ? (canSeeLevels ? lvlStroke[u.current_level] : '#a8d800') : 'transparent'};border-radius:6px;transition:width 0.6s ease"></div>
            </div>
          </div>`;
      }).join('');

      const bestDiffBadge = best !== worst
        ? `<div class="card" style="flex:1;border-left:4px solid #ffcccc">
            <div class="card-body" style="padding:12px 16px">
              <div style="font-size:0.7rem;color:#aaa;font-weight:700;margin-bottom:4px">建議複習</div>
              <div style="font-weight:800;font-size:0.9rem">Unit ${worst.unit_number} ${worst.unit_title}</div>
              <div style="font-size:0.82rem;color:#aaa">${Math.round(worst.performance_score)} 分</div>
            </div>
          </div>` : '';

      const lineChartHtml = attempted.length > 1
        ? `<div class="card" style="margin-top:16px">
            <div class="card-body">
              <div style="font-size:0.85rem;font-weight:800;margin-bottom:10px">學習趨勢</div>
              <canvas id="perf-line" style="max-height:180px"></canvas>
            </div>
          </div>` : '';

      perfList.innerHTML = `
        <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
          <div class="card" style="flex:1;min-width:140px;border-left:4px solid var(--color-lime)">
            <div class="card-body" style="padding:12px 16px">
              <div style="font-size:0.7rem;color:#aaa;font-weight:700;margin-bottom:4px">最佳單元</div>
              <div style="font-weight:800;font-size:0.9rem">Unit ${best.unit_number} ${best.unit_title}</div>
              <div style="font-size:0.82rem;color:#aaa">${Math.round(best.performance_score)} 分</div>
            </div>
          </div>
          ${bestDiffBadge}
          <div class="card" style="flex:1;min-width:100px">
            <div class="card-body" style="padding:12px 16px">
              <div style="font-size:0.7rem;color:#aaa;font-weight:700;margin-bottom:4px">平均分數</div>
              <div style="font-weight:800;font-size:1.4rem">${avg}</div>
            </div>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="card">
            <div class="card-body">
              <div style="font-size:0.85rem;font-weight:800;margin-bottom:14px">各單元分數</div>
              ${barRows}
            </div>
          </div>
          <div class="card">
            <div class="card-body" style="display:flex;flex-direction:column;align-items:center">
              <div style="font-size:0.85rem;font-weight:800;margin-bottom:8px;align-self:flex-start">能力雷達圖</div>
              <canvas id="perf-radar" style="max-width:260px;max-height:260px"></canvas>
            </div>
          </div>
        </div>

        ${lineChartHtml}
      `;

      // Radar chart
      new Chart(document.getElementById('perf-radar'), {
        type: 'radar',
        data: {
          labels: performanceUnits.map(u => `U${u.unit_number}`),
          datasets: [{
            data: performanceUnits.map(u => u.performance_score != null ? Math.round(u.performance_score) : 0),
            backgroundColor: 'rgba(168,216,0,0.18)',
            borderColor: '#a8d800',
            borderWidth: 2,
            pointBackgroundColor: '#a8d800',
            pointRadius: 3,
          }]
        },
        options: {
          scales: {
            r: {
              min: 0, max: 100,
              ticks: { stepSize: 25, color: '#666', font: { size: 10 }, backdropColor: 'transparent' },
              grid: { color: '#333' },
              pointLabels: { color: '#ccc', font: { size: 11 } },
              angleLines: { color: '#333' },
            }
          },
          plugins: { legend: { display: false } },
        }
      });

      // Line chart
      if (attempted.length > 1) {
        new Chart(document.getElementById('perf-line'), {
          type: 'line',
          data: {
            labels: attempted.map(u => `Unit ${u.unit_number}`),
            datasets: [{
              data: attempted.map(u => Math.round(u.performance_score)),
              backgroundColor: 'rgba(168,216,0,0.12)',
              borderColor: '#a8d800',
              borderWidth: 2,
              pointBackgroundColor: '#a8d800',
              pointRadius: 4,
              fill: true,
              tension: 0.35,
            }]
          },
          options: {
            scales: {
              y: { min: 0, max: 100, ticks: { color: '#888', font: { size: 11 } }, grid: { color: '#2a2a2a' } },
              x: { ticks: { color: '#888', font: { size: 11 } }, grid: { color: '#2a2a2a' } },
            },
            plugins: { legend: { display: false } },
          }
        });
      }
    }

    async function loadDashboard() {
      const profile = await AuthAPI.getProfile();
      const canSeeLevels = profile && profile.role !== 'student';
      if (profile) {
        document.getElementById('user-greeting').textContent = `你好，${profile.username}`;
        document.getElementById('user-name').textContent = `歡迎回來，${profile.username}！今天也繼續學習吧。`;
        const roleMap = { student: '學生', teacher: '老師', admin: '管理員' };
        document.getElementById('account-name').textContent = profile.username;
        document.getElementById('account-role').textContent = roleMap[profile.role] || profile.role;
        document.getElementById('account-email').textContent = profile.email || profile.student_id || '未設定 Email';
        if (profile.role === 'admin') {
          document.getElementById('admin-dashboard-link').style.display = '';
        }
      }

      // 學習路徑（8 個單元）
      const pathRes = await apiFetch('/learning/adaptive-path/');
      const units = pathRes && pathRes.ok ? await pathRes.json() : [];
      const completedCount = units.filter(u => u.status === 'completed').length;
      document.getElementById('stat-enrolled').textContent = completedCount;
      document.getElementById('stat-completed').textContent = `${completedCount} / 8`;

      const statusLabel = { completed: '已完成', available: '進行中', locked: '尚未解鎖' };
      const statusColor = { completed: '#38a169', available: 'var(--color-black)', locked: '#aaa' };
      const levelColors = { 1: '#ffcccc', 2: 'var(--color-lime)', 3: '#b3d9ff' };
      const levelShortName = {1:'L1 補救', 2:'L2 標準', 3:'L3 進階'};

      const unitList = document.getElementById('unit-path-list');
      unitList.innerHTML = units.map(u => {
        const isLocked = u.status === 'locked';
        const levelHeader = canSeeLevels ? `
          <div style="background:${levelColors[u.current_level]};padding:10px 16px;border-radius:var(--radius-md) var(--radius-md) 0 0;font-size:0.72rem;font-weight:800">
            ${u.level_name}
          </div>` : '';
        const levelSwitcher = (canSeeLevels && u.last_score != null && u.all_levels) ? `
          <div style="display:flex;gap:4px;margin-top:10px">
            ${[1,2,3].map(lvl => {
              const lid = u.all_levels[lvl];
              if (!lid) return '';
              const isActive = lvl === u.current_level;
              const bg = isActive ? levelColors[lvl] : '#eee';
              const border = isActive ? '2px solid var(--color-black)' : '2px solid transparent';
              return `<a href="lesson.html?lesson_id=${lid}"
                style="flex:1;text-align:center;padding:5px 2px;font-size:0.68rem;font-weight:700;
                       border-radius:4px;border:${border};background:${bg};
                       color:var(--color-black);text-decoration:none;line-height:1.3">
                ${levelShortName[lvl]}
              </a>`;
            }).join('')}
          </div>` : '';

        return `
          <div class="card" style="opacity:${isLocked ? '0.5' : '1'}">
            ${levelHeader}
            <div class="card-body">
              <div style="font-size:0.75rem;color:#aaa;font-weight:700">Unit ${u.unit_number}</div>
              <div class="card-title" style="margin:4px 0 8px">${u.unit_title}</div>
              <div style="font-size:0.8rem;font-weight:700;color:${statusColor[u.status]};margin-bottom:12px">
                ${statusLabel[u.status]}
                ${u.last_score ? `· ${Math.round(u.last_score)} 分` : ''}
              </div>
              ${!isLocked && u.lesson_id
                ? `<a href="lesson.html?lesson_id=${u.lesson_id}" class="btn btn-primary" style="width:100%;justify-content:center;font-size:0.85rem">
                    ${u.status === 'completed' ? '複習單元' : '開始學習 →'}
                  </a>
                  ${levelSwitcher}`
                : `<div class="btn btn-outline" style="width:100%;justify-content:center;font-size:0.85rem;opacity:0.4;cursor:not-allowed">🔒 尚未解鎖</div>`
              }
            </div>
          </div>`;
      }).join('');

      // 推薦
      const recData = await LearningAPI.getRecommendations();
      const recs = recData.results || recData;
      document.getElementById('stat-recommend').textContent = recs.length;
      const recList = document.getElementById('recommendations-list');
      if (!recs.length) {
        recList.innerHTML = '<p style="color:#aaa">目前無推薦，完成單元評量後系統將為你推薦</p>';
      } else {
        recList.innerHTML = recs.map(r => `
          <div class="card" style="margin-bottom:12px">
            <div class="card-body" style="display:flex;justify-content:space-between;align-items:center">
              <div>
                <div class="card-title" style="margin-bottom:4px">${r.lesson_title}</div>
                <div class="card-desc">${canSeeLevels ? r.reason : '根據最近一次評量，建議前往這個單元繼續學習。'}</div>
              </div>
              <a href="lesson.html?lesson_id=${r.lesson_id}" class="btn btn-lime" style="flex-shrink:0">前往學習 →</a>
            </div>
          </div>
        `).join('');
      }

      renderPerformance(units, canSeeLevels);
    }

    loadDashboard();
  </script>
</body>
</html>
