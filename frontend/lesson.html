<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>學習單元 — AdaptLearn</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <!-- Highlight.js (程式碼語法高亮) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* === Embedded 模式 === */
    body.embedded .navbar { display: none !important; }
    body.embedded .lesson-layout { padding: 24px 32px !important; gap: 28px !important; }

    .lesson-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: calc(100vh - 68px);
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 40px;
      gap: 40px;
    }
    .lesson-sidebar { position: sticky; top: 100px; align-self: start; }
    .lesson-sidebar h3 { font-size: 0.85rem; font-weight: 700; color: #aaa; letter-spacing: 1px; margin-bottom: 12px; }
    .lesson-nav-list { list-style: none; }
    .lesson-nav-list li a {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: var(--radius-sm);
      font-size: 0.88rem; color: #555; transition: all 0.2s;
    }
    .lesson-nav-list li a:hover,
    .lesson-nav-list li a.active { background: var(--color-gray); color: var(--color-black); font-weight: 600; }
    .lesson-nav-list .num {
      width: 22px; height: 22px; border-radius: 50%; background: var(--color-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; flex-shrink: 0;
    }
    .lesson-nav-list li a.active .num { background: var(--color-lime); }

    /* Markdown 渲染區樣式 */
    .md-content { line-height: 1.8; font-size: 0.98rem; }
    .md-content h1 { font-size: 2rem; font-weight: 900; margin: 0 0 8px; }
    .md-content h2 { font-size: 1.4rem; font-weight: 800; margin: 40px 0 16px; padding-top: 40px; border-top: 1px solid var(--color-border); }
    .md-content h3 { font-size: 1.1rem; font-weight: 700; margin: 24px 0 12px; }
    .md-content h4 { font-size: 1rem; font-weight: 700; margin: 20px 0 8px; color: #444; }
    .md-content p { margin-bottom: 16px; }
    .md-content ul, .md-content ol { padding-left: 24px; margin-bottom: 16px; }
    .md-content li { margin-bottom: 6px; }
    .md-content code {
      background: var(--color-gray); padding: 2px 6px; border-radius: 4px;
      font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 0.88em;
    }
    .md-content pre { margin: 20px 0; border-radius: var(--radius-sm); overflow: auto; }
    .md-content pre code { background: none; padding: 0; font-size: 0.88rem; }
    .md-content blockquote {
      border-left: 4px solid var(--color-lime); padding: 12px 20px;
      background: #fafff0; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; margin: 16px 0;
    }
    .md-content table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    .md-content th { background: var(--color-black); color: var(--color-white); padding: 10px 14px; text-align: left; }
    .md-content td { padding: 10px 14px; border-bottom: 1px solid var(--color-border); }
    .md-content tr:hover td { background: var(--color-gray); }
    .md-content details { border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: 12px 16px; margin: 12px 0; }
    .md-content summary { font-weight: 600; cursor: pointer; }

    .lesson-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--color-border);
    }
    .quiz-banner {
      background: var(--color-black); color: var(--color-white);
      border-radius: var(--radius-md); padding: 24px 28px;
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 40px; gap: 20px;
    }
    @media (max-width: 768px) {
      .lesson-layout { grid-template-columns: 1fr; padding: 20px; }
      .lesson-sidebar { display: none; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-logo"><a href="index.html"><span>AL</span> AdaptLearn</a></div>
    <ul class="navbar-links">
      <li><a href="/">← 回首頁</a></li>
    </ul>
    <div class="navbar-right" id="nav-right"></div>
  </nav>

  <div class="lesson-layout">
    <!-- 左側單元導覽 -->
    <aside class="lesson-sidebar">
      <h3>COURSE UNITS</h3>
      <ul class="lesson-nav-list" id="lesson-nav"></ul>
    </aside>

    <!-- 主內容 -->
    <main>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
        <a id="back-link" href="/" style="font-size:0.85rem;color:#aaa">← 返回</a>
        <span id="lesson-tag-divider" style="color:var(--color-border);display:none">|</span>
        <span class="card-tag" id="lesson-tag" style="display:none">載入中</span>
      </div>

      <div id="lesson-content" class="md-content">
        <p style="color:#aaa">載入單元內容中...</p>
      </div>

      <!-- 評量入口 -->
      <div class="quiz-banner" id="quiz-banner" style="display:none">
        <div>
          <div style="font-size:1.1rem;font-weight:800">✏️ 單元評量</div>
          <div style="color:#aaa;font-size:0.9rem;margin-top:4px">完成本單元的形成性評量，確認學習成效</div>
        </div>
        <a id="quiz-link" href="#" class="btn btn-lime" style="flex-shrink:0">開始評量 →</a>
      </div>

      <div class="lesson-footer">
        <a id="prev-btn" href="#" class="btn btn-outline" style="display:none">← 上一單元</a>
        <div></div>
        <a id="next-btn" href="#" class="btn btn-primary" style="display:none">下一單元 →</a>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const lessonId = params.get('lesson_id');
    const IS_EMBEDDED = params.get('embedded') === '1';
    const EMBEDDED_SFX = IS_EMBEDDED ? '&embedded=1' : '';
    if (IS_EMBEDDED) document.body.classList.add('embedded');

    if (!IS_EMBEDDED && !localStorage.getItem('access_token')) {
      window.location.href = 'login.html';
    }
    if (!lessonId) {
      window.location.href = IS_EMBEDDED ? 'courses.html?embedded=1' : '/';
    }

    // 立刻把 back-link 預設成安全 URL，避免使用者在 loadLesson 完成前點到預設的 "/"
    if (IS_EMBEDDED) {
      const _bl = document.getElementById('back-link');
      if (_bl) {
        _bl.href = 'courses.html?embedded=1';
        _bl.textContent = '← 返回課程列表';
      }
    }

    // ── 教材瀏覽 / 線上時數埋點（RQ-05 投入度代理變數）──────────────
    if (lessonId && localStorage.getItem('access_token')) {
      LearningAPI.recordActivity(lessonId, 0); // 計一次瀏覽
      let activeSince = Date.now();
      const flushTime = () => {
        const secs = Math.round((Date.now() - activeSince) / 1000);
        activeSince = Date.now();
        if (secs > 0) LearningAPI.recordActivity(lessonId, Math.min(secs, 1800));
      };
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') flushTime();
        else activeSince = Date.now();
      });
      window.addEventListener('pagehide', flushTime);
      setInterval(() => { if (!document.hidden) flushTime(); }, 300000);
    }

    const diffMap = { beginner: 'Level 1 補救版', intermediate: 'Level 2 標準版', advanced: 'Level 3 進階版' };

    // 設定 marked 搭配 highlight.js
    marked.setOptions({
      highlight: (code, lang) => {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: true,
    });

    async function loadLesson() {
      // 同步載入單元內容 + 學習路徑
      const [lessonRes, pathRes, profile] = await Promise.all([
        apiFetch(`/courses/lesson/${lessonId}/`),
        apiFetch('/learning/adaptive-path/'),
        AuthAPI.getProfile(),
      ]);

      if (!lessonRes || !lessonRes.ok) { showToast('無法載入單元', 'error'); return; }
      const lesson = await lessonRes.json();

      // embedded 模式：back-link 改成回該課程詳情頁
      if (IS_EMBEDDED && lesson.course) {
        document.getElementById('back-link').href = `course-detail.html?id=${lesson.course}&embedded=1`;
        document.getElementById('back-link').textContent = '← 回課程單元列表';
      }
      const units = pathRes && pathRes.ok ? await pathRes.json() : [];
      const canSeeLevels = profile && profile.role !== 'student';
      // admin / teacher 可以無視鎖定，自由瀏覽所有單元（用於內容預覽 / 測試）
      const canBrowseAll = canSeeLevels;

      const currentUnit = lesson.order; // 1–8

      document.title = `${lesson.title} — AdaptLearn`;
      if (canSeeLevels) {
        document.getElementById('lesson-tag-divider').style.display = '';
        document.getElementById('lesson-tag').style.display = '';
        document.getElementById('lesson-tag').textContent = diffMap[lesson.course_difficulty] || '';
      }

      // 渲染 markdown
      const html = DOMPurify.sanitize(marked.parse(lesson.content || '# 本單元內容待上傳'));
      document.getElementById('lesson-content').innerHTML = html;
      document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));

      // ── 側欄：從適性路徑建立（只顯示解鎖單元，鎖住單元灰暗不可點）──
      const levelBg = {1:'#ffcccc', 2:'#c6f6d5', 3:'#b3d9ff'};
      const nav = document.getElementById('lesson-nav');
      nav.innerHTML = units.map(u => {
        const isActive = u.unit_number === currentUnit;
        const isLockedForUser = u.status === 'locked' && !canBrowseAll;
        if (isLockedForUser) {
          return `
            <li>
              <a style="opacity:0.35;cursor:not-allowed;pointer-events:none;display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-sm);font-size:0.88rem;color:#aaa">
                <span class="num">🔒</span>${escapeHtml(u.unit_title)}
              </a>
            </li>`;
        }
        // admin/teacher 看到原本鎖住的單元時加個 hint badge，但仍可點
        const adminHint = (u.status === 'locked' && canBrowseAll)
          ? `<span style="font-size:0.65rem;background:#FEF4E1;color:#7a5200;padding:1px 6px;border-radius:8px;margin-left:auto;font-weight:700">預覽</span>`
          : '';
        return `
          <li>
            <a href="lesson.html?lesson_id=${u.lesson_id}${EMBEDDED_SFX}" class="${isActive ? 'active' : ''}">
              <span class="num" style="background:${canSeeLevels && !isActive ? levelBg[u.current_level] : ''}">${u.unit_number}</span>
              ${escapeHtml(u.unit_title)}
              ${adminHint}
            </a>
          </li>`;
      }).join('');

      // ── 上下頁按鈕（依適性路徑，next 只有解鎖才顯示）────────────
      if (currentUnit > 1) {
        const prevUnit = units.find(u => u.unit_number === currentUnit - 1);
        if (prevUnit && prevUnit.lesson_id) {
          const btn = document.getElementById('prev-btn');
          btn.href = `lesson.html?lesson_id=${prevUnit.lesson_id}${EMBEDDED_SFX}`;
          btn.textContent = `← ${prevUnit.unit_title}`;
          btn.style.display = '';
        }
      }
      if (currentUnit < 8) {
        const nextUnit = units.find(u => u.unit_number === currentUnit + 1);
        // admin/teacher 可預覽鎖住的下一單元
        const nextAccessible = nextUnit && nextUnit.lesson_id && (nextUnit.status !== 'locked' || canBrowseAll);
        if (nextAccessible) {
          const btn = document.getElementById('next-btn');
          btn.href = `lesson.html?lesson_id=${nextUnit.lesson_id}${EMBEDDED_SFX}`;
          btn.textContent = `${nextUnit.unit_title} →`;
          btn.style.display = '';
        }
      }

      // ── 評量入口 ─────────────────────────────────────────────────
      const quizRes = await apiFetch(`/assessments/lesson/${lessonId}/`);
      if (quizRes && quizRes.ok) {
        const quizData = await quizRes.json();
        const quizzes = quizData.results || quizData;
        if (quizzes.length > 0) {
          document.getElementById('quiz-banner').style.display = 'flex';
          document.getElementById('quiz-link').href = `quiz.html?quiz_id=${quizzes[0].id}&lesson_id=${lessonId}${EMBEDDED_SFX}`;
        }
      }
    }

    loadLesson();
  </script>
</body>
</html>
