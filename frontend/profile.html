<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>個人資料 — AdaptLearn</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* === Embedded 模式：在 admin-shell iframe 內隱藏 navbar/sidebar === */
    body.embedded .navbar,
    body.embedded .profile-layout > .sidebar { display: none !important; }
    body.embedded .profile-layout { grid-template-columns: 1fr !important; }
    body.embedded .main-content { padding: 24px 32px !important; }

    .profile-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: calc(100vh - 68px);
    }
    .avatar-circle {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--color-lime); display: flex; align-items: center;
      justify-content: center; font-size: 2rem; font-weight: 800;
      color: var(--color-black); margin-bottom: 12px;
    }
    .profile-card {
      background: var(--color-white); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: 32px; max-width: 560px;
    }
    .profile-section-title {
      font-size: 0.8rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--color-gray-md);
      margin: 32px 0 16px;
    }
    .profile-section-title:first-child { margin-top: 0; }
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0; border-bottom: 1px solid var(--color-border);
      font-size: 0.9rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--color-gray-md); font-weight: 500; }
    .info-value { font-weight: 600; }
    .badge-role {
      background: var(--color-lime); color: var(--color-black);
      padding: 3px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-logo"><a href="index.html"><span>AL</span> AdaptLearn</a></div>
    <ul class="navbar-links"></ul>
    <div class="navbar-right" id="nav-right"></div>
  </nav>

  <div class="profile-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div style="font-size:1.1rem;font-weight:800;color:var(--color-white)">學習中心</div>
      <ul class="sidebar-nav">
        <li><a href="/">📊 學習總覽</a></li>
        <li><a href="/#my-courses">📚 我的課程</a></li>
        <li><a href="/#recommendations">✨ 適性推薦</a></li>
        <li><a href="profile.html" class="active">👤 個人資料</a></li>
      </ul>
      <div style="margin-top:auto;padding-top:32px">
        <button class="btn btn-outline" style="width:100%;color:#fff;border-color:#333"
          onclick="AuthAPI.logout()">登出</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <div class="page-title">個人資料</div>
      <div class="page-subtitle">管理你的帳號資訊</div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start">

        <!-- 左：頭像 + 基本資料 -->
        <div>
          <div class="profile-card">
            <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px">
              <div class="avatar-circle" id="avatar-circle">?</div>
              <div>
                <div style="font-size:1.3rem;font-weight:800" id="display-name">—</div>
                <div style="font-size:0.85rem;color:#aaa" id="display-email">—</div>
              </div>
            </div>

            <div class="profile-section-title">帳號資訊</div>
            <div class="info-row">
              <span class="info-label">帳號</span>
              <span class="info-value" id="info-username">—</span>
            </div>
            <div class="info-row">
              <span class="info-label">學號</span>
              <span class="info-value" id="info-student-id">—</span>
            </div>
            <div class="info-row">
              <span class="info-label">角色</span>
              <span class="badge-role" id="info-role">—</span>
            </div>
          </div>
        </div>

        <!-- 右：編輯表單 -->
        <div>
          <div class="profile-card">
            <div class="profile-section-title">編輯資料</div>
            <form id="profile-form">
              <div class="form-group">
                <label class="form-label">電子郵件</label>
                <input class="form-input" type="email" id="edit-email" placeholder="your@email.com" />
              </div>
              <div class="form-group">
                <label class="form-label">學號</label>
                <input class="form-input" type="text" id="edit-student-id" placeholder="學號" />
              </div>
              <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">
                儲存變更
              </button>
            </form>

            <div class="profile-section-title" style="margin-top:32px">修改密碼</div>
            <form id="password-form">
              <div class="form-group">
                <label class="form-label">目前密碼</label>
                <input class="form-input" type="password" id="old-password" autocomplete="current-password" />
              </div>
              <div class="form-group">
                <label class="form-label">新密碼</label>
                <input class="form-input" type="password" id="new-password" autocomplete="new-password" placeholder="至少 8 個字元" />
              </div>
              <div class="form-group">
                <label class="form-label">確認新密碼</label>
                <input class="form-input" type="password" id="confirm-password" autocomplete="new-password" placeholder="再輸入一次" />
                <div class="form-error" id="err-password"></div>
              </div>
              <button type="submit" class="btn btn-outline" style="width:100%;justify-content:center">
                更新密碼
              </button>
            </form>
          </div>
        </div>

      </div>


      <!-- 我的學習成長報表 -->
      <div style="margin-top:32px" id="growth-wrap">
        <div class="profile-card" style="max-width:100%">
          <div class="profile-section-title">我的學習成長報表</div>
          <div id="growth-report"><p style="color:#888">載入中…</p></div>
        </div>
      </div>

    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    // === embedded 偵測 ===
    const IS_EMBEDDED = new URLSearchParams(window.location.search).get('embedded') === '1';
    if (IS_EMBEDDED) document.body.classList.add('embedded');

    if (!IS_EMBEDDED && !localStorage.getItem('access_token')) window.location.href = 'login.html';

    const roleMap = { student: '學生', teacher: '教師', admin: '管理員' };

    // 非 embedded 且 admin → 自動跳回 shell（避免看到學生視角的舊側欄/連結）
    // 在 iframe 內就不跳 shell（避免套娃），改成補 embedded 自我重整
    async function redirectAdminIfDirect() {
      if (IS_EMBEDDED) return false;
      const profile = await AuthAPI.getProfile();
      if (profile && profile.role === 'admin') {
        if (window.self !== window.top) {
          const u = new URL(window.location.href);
          u.searchParams.set('embedded', '1');
          window.location.replace(u.toString());
        } else {
          window.location.replace('/admin-shell.html#profile');
        }
        return true;
      }
      return false;
    }

    async function loadProfile() {
      // admin 直接打開本頁 → 改成跳 shell（除非已是 embedded 模式由 shell 載入）
      if (await redirectAdminIfDirect()) return;

      const profile = await AuthAPI.getProfile();
      if (!profile) { showToast('無法載入個人資料', 'error'); return; }

      const initial = (profile.username || '?')[0].toUpperCase();
      document.getElementById('avatar-circle').textContent = initial;
      document.getElementById('display-name').textContent = profile.username;
      document.getElementById('display-email').textContent = profile.email || '未設定';
      document.getElementById('info-username').textContent = profile.username;
      document.getElementById('info-student-id').textContent = profile.student_id || '未設定';
      document.getElementById('info-role').textContent = roleMap[profile.role] || profile.role;

      // 填入編輯表單
      document.getElementById('edit-email').value = profile.email || '';
      document.getElementById('edit-student-id').value = profile.student_id || '';
      document.getElementById('edit-bio').value = profile.bio || '';
    }

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const res = await apiFetch('/auth/profile/', {
        method: 'PATCH',
        body: JSON.stringify({
          email: document.getElementById('edit-email').value,
          student_id: document.getElementById('edit-student-id').value,
          bio: document.getElementById('edit-bio').value,
        }),
      });
      if (res && res.ok) {
        showToast('資料更新成功！');
        loadProfile();
      } else {
        showToast('更新失敗', 'error');
      }
    });

    document.getElementById('password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const oldPassword = document.getElementById('old-password').value;
      const p1 = document.getElementById('new-password').value;
      const p2 = document.getElementById('confirm-password').value;
      const errEl = document.getElementById('err-password');
      errEl.style.display = 'none';
      if (!oldPassword || !p1 || !p2) {
        errEl.textContent = '請完整填寫目前密碼與新密碼';
        errEl.style.display = 'block';
        return;
      }
      if (p1 !== p2) {
        errEl.textContent = '兩次密碼不一致';
        errEl.style.display = 'block';
        return;
      }
      const { ok, data } = await AuthAPI.changePassword({
        old_password: oldPassword,
        new_password: p1,
        new_password2: p2,
      });
      if (ok) {
        document.getElementById('password-form').reset();
        showToast('密碼已更新，請重新登入');
        setTimeout(() => AuthAPI.logout(), 900);
      } else {
        const message = data?.old_password?.[0] || data?.new_password?.[0] || data?.non_field_errors?.[0] || '密碼更新失敗';
        errEl.textContent = message;
        errEl.style.display = 'block';
      }
    });

    // === 我的學習成長報表 ===
    const numv = (v, d = '—') => (v === null || v === undefined) ? d : v;
    function growthDelta(s) {
      if (s.delta === null || s.delta === undefined) {
        return s.post_only ? '<span style="color:#888">僅後測</span>' : '<span style="color:#888">—</span>';
      }
      const color = s.improved ? '#15803d' : (s.improved === false ? '#b91c1c' : '#888');
      const txt = s.improved ? '進步' : (s.improved === false ? '退步' : '持平');
      const arrow = s.delta > 0 ? '▲' : (s.delta < 0 ? '▼' : '◆');
      return `<span style="color:${color};font-weight:800">${arrow} ${s.delta > 0 ? '+' : ''}${s.delta} ${txt}</span>`;
    }
    async function loadGrowthReport() {
      const box = document.getElementById('growth-report');
      const d = await ReportAPI.myReport();
      if (!d) { box.innerHTML = '<p style="color:#888">尚無法載入報表。</p>'; return; }
      const e = d.effectiveness || {};
      const u = d.usage || {};
      const p = d.problem_solving || {};
      const q = d.questionnaire || {};

      const cardCss = 'background:#faf9f5;border:1px solid #ececE4;border-radius:12px;padding:16px';
      const metric = (label, val, unit, extra = '') =>
        `<div style="${cardCss}"><div style="font-size:.78rem;color:#888;font-weight:700">${label}</div>
         <div style="font-size:1.5rem;font-weight:900;margin-top:4px">${numv(val)}<small style="font-size:.85rem;color:#999;font-weight:600"> ${unit}</small></div>
         ${extra ? `<div style="font-size:.74rem;color:#999;margin-top:2px">${extra}</div>` : ''}</div>`;

      const effHtml = `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:8px">
        ${metric('平均評量分數', e.avg_score, '分', e.class_avg_score != null ? `班級平均 ${e.class_avg_score} 分` : '')}
        ${metric('完成單元', e.completed_units, `/ ${e.total_units}`, '')}
        ${metric('每次使用長度', u.avg_session_minutes, '分', '')}
        ${metric('每週使用次數', u.avg_sessions_per_active_week, '次', u.avg_minutes_per_active_week != null ? `每週約 ${u.avg_minutes_per_active_week} 分` : '')}
        ${metric('解題答對率', p.short_answer_accuracy, '%', p.class_short_answer_accuracy != null ? `班級 ${p.class_short_answer_accuracy}%` : '')}
      </div>`;

      box.innerHTML = `
        <div style="font-size:.82rem;font-weight:800;color:#666;margin-bottom:10px">學習成效與使用情形</div>
        ${effHtml}`;
    }

    loadProfile();
    loadGrowthReport();
  </script>
</body>
</html>
