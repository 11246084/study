<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>個人資料 — AdaptLearn</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .profile-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: calc(100vh - 68px);
    }
    .avatar-circle {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--color-lime); display: flex; align-items: center;
      justify-content: center; font-size: 2rem; font-weight: 800;
      color: var(--color-black); margin-bottom: 12px;
    }
    .profile-card {
      background: var(--color-white); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: 32px; max-width: 560px;
    }
    .profile-section-title {
      font-size: 0.8rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--color-gray-md);
      margin: 32px 0 16px;
    }
    .profile-section-title:first-child { margin-top: 0; }
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0; border-bottom: 1px solid var(--color-border);
      font-size: 0.9rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--color-gray-md); font-weight: 500; }
    .info-value { font-weight: 600; }
    .badge-role {
      background: var(--color-lime); color: var(--color-black);
      padding: 3px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-logo"><a href="index.html"><span>AL</span> AdaptLearn</a></div>
    <ul class="navbar-links">
      <li><a href="index.html">首頁</a></li>
      <li><a href="courses.html">課程</a></li>
      <li><a href="/">學習中心</a></li>
    </ul>
    <div class="navbar-right" id="nav-right"></div>
  </nav>

  <div class="profile-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div style="font-size:1.1rem;font-weight:800;color:var(--color-white)">學習中心</div>
      <ul class="sidebar-nav">
        <li><a href="/">📊 學習總覽</a></li>
        <li><a href="/#my-courses">📚 我的課程</a></li>
        <li><a href="/#recommendations">✨ 適性推薦</a></li>
        <li><a href="profile.html" class="active">👤 個人資料</a></li>
        <li><a href="courses.html">🔍 瀏覽課程</a></li>
      </ul>
      <div style="margin-top:auto;padding-top:32px">
        <button class="btn btn-outline" style="width:100%;color:#fff;border-color:#333"
          onclick="AuthAPI.logout()">登出</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <div class="page-title">個人資料</div>
      <div class="page-subtitle">管理你的帳號資訊</div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start">

        <!-- 左：頭像 + 基本資料 -->
        <div>
          <div class="profile-card">
            <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px">
              <div class="avatar-circle" id="avatar-circle">?</div>
              <div>
                <div style="font-size:1.3rem;font-weight:800" id="display-name">—</div>
                <div style="font-size:0.85rem;color:#aaa" id="display-email">—</div>
              </div>
            </div>

            <div class="profile-section-title">帳號資訊</div>
            <div class="info-row">
              <span class="info-label">帳號</span>
              <span class="info-value" id="info-username">—</span>
            </div>
            <div class="info-row">
              <span class="info-label">學號</span>
              <span class="info-value" id="info-student-id">—</span>
            </div>
            <div class="info-row">
              <span class="info-label">角色</span>
              <span class="badge-role" id="info-role">—</span>
            </div>
          </div>
        </div>

        <!-- 右：編輯表單 -->
        <div>
          <div class="profile-card">
            <div class="profile-section-title">編輯資料</div>
            <form id="profile-form">
              <div class="form-group">
                <label class="form-label">電子郵件</label>
                <input class="form-input" type="email" id="edit-email" placeholder="your@email.com" />
              </div>
              <div class="form-group">
                <label class="form-label">學號</label>
                <input class="form-input" type="text" id="edit-student-id" placeholder="學號" />
              </div>
              <div class="form-group">
                <label class="form-label">自我介紹</label>
                <textarea class="form-input" id="edit-bio" rows="4"
                  placeholder="簡單介紹一下自己..." style="resize:vertical"></textarea>
              </div>
              <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">
                儲存變更
              </button>
            </form>

            <div class="profile-section-title" style="margin-top:32px">修改密碼</div>
            <form id="password-form">
              <div class="form-group">
                <label class="form-label">新密碼</label>
                <input class="form-input" type="password" id="new-password" placeholder="至少 8 個字元" />
              </div>
              <div class="form-group">
                <label class="form-label">確認新密碼</label>
                <input class="form-input" type="password" id="confirm-password" placeholder="再輸入一次" />
                <div class="form-error" id="err-password"></div>
              </div>
              <button type="submit" class="btn btn-outline" style="width:100%;justify-content:center">
                更新密碼
              </button>
            </form>
          </div>
        </div>

      </div>

      <!-- 學習統計 -->
      <div style="margin-top:32px">
        <div class="profile-card" style="max-width:100%">
          <div class="profile-section-title">我的自我介紹</div>
          <p id="display-bio" style="color:#555;font-size:0.95rem;line-height:1.7">—</p>
        </div>
      </div>

    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    if (!localStorage.getItem('access_token')) window.location.href = 'login.html';

    const roleMap = { student: '學生', teacher: '教師', admin: '管理員' };

    async function loadProfile() {
      const profile = await AuthAPI.getProfile();
      if (!profile) { showToast('無法載入個人資料', 'error'); return; }

      const initial = (profile.username || '?')[0].toUpperCase();
      document.getElementById('avatar-circle').textContent = initial;
      document.getElementById('display-name').textContent = profile.username;
      document.getElementById('display-email').textContent = profile.email || '未設定';
      document.getElementById('info-username').textContent = profile.username;
      document.getElementById('info-student-id').textContent = profile.student_id || '未設定';
      document.getElementById('info-role').textContent = roleMap[profile.role] || profile.role;
      document.getElementById('display-bio').textContent = profile.bio || '尚未填寫自我介紹';

      // 填入編輯表單
      document.getElementById('edit-email').value = profile.email || '';
      document.getElementById('edit-student-id').value = profile.student_id || '';
      document.getElementById('edit-bio').value = profile.bio || '';
    }

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const res = await apiFetch('/auth/profile/', {
        method: 'PATCH',
        body: JSON.stringify({
          email: document.getElementById('edit-email').value,
          student_id: document.getElementById('edit-student-id').value,
          bio: document.getElementById('edit-bio').value,
        }),
      });
      if (res && res.ok) {
        showToast('資料更新成功！');
        loadProfile();
      } else {
        showToast('更新失敗', 'error');
      }
    });

    document.getElementById('password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const p1 = document.getElementById('new-password').value;
      const p2 = document.getElementById('confirm-password').value;
      const errEl = document.getElementById('err-password');
      errEl.style.display = 'none';
      if (p1 !== p2) {
        errEl.textContent = '兩次密碼不一致';
        errEl.style.display = 'block';
        return;
      }
      // 密碼修改需後端另外實作 change-password endpoint，此處僅示意
      showToast('密碼修改功能開發中', 'error');
    });

    loadProfile();
  </script>
</body>
</html>
