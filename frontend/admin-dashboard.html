<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>管理總覽 - AdaptLearn</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .admin-shell { min-height: calc(100vh - 68px); background: var(--color-gray); padding: 32px 40px; }
    .admin-wrap { max-width: 1280px; margin: 0 auto; }
    .admin-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 24px; }
    .admin-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 4px; }
    .admin-subtitle { color: #666; font-size: 0.92rem; }
    .admin-tools { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .admin-top-links { display: flex; gap: 24px; list-style: none; font-size: 0.92rem; font-weight: 700; }
    .admin-top-links a { padding: 6px 12px; border-radius: 999px; }
    .admin-top-links a.active { background: var(--color-black); color: var(--color-lime); }
    .admin-input, .admin-select {
      border: 1.5px solid var(--color-border); border-radius: var(--radius-sm);
      padding: 10px 12px; font-family: var(--font-main); font-size: 0.9rem; background: white;
    }
    .admin-input { min-width: 240px; }
    .admin-grid { display: grid; grid-template-columns: repeat(5, minmax(150px, 1fr)); gap: 14px; margin-bottom: 20px; }
    .admin-stat { background: white; border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 18px; }
    .admin-stat strong { display: block; font-size: 1.8rem; line-height: 1; font-weight: 900; margin-bottom: 8px; }
    .admin-stat span { color: #777; font-size: 0.82rem; font-weight: 700; }
    .admin-panel { background: white; border: 1px solid var(--color-border); border-radius: var(--radius-md); overflow: hidden; }
    .table-scroll { overflow-x: auto; }
    .admin-table { width: 100%; border-collapse: collapse; min-width: 980px; }
    .admin-table th {
      background: #101010; color: white; text-align: left; padding: 13px 14px;
      font-size: 0.78rem; letter-spacing: 0.02em; white-space: nowrap;
    }
    .admin-table td { padding: 14px; border-bottom: 1px solid var(--color-border); vertical-align: middle; font-size: 0.88rem; }
    .admin-table tr:last-child td { border-bottom: none; }
    .student-name { font-weight: 800; }
    .student-meta { color: #777; font-size: 0.78rem; margin-top: 2px; }
    .pill { display: inline-flex; align-items: center; border-radius: 999px; padding: 3px 9px; font-size: 0.74rem; font-weight: 800; }
    .pill.ok { background: #c6f6d5; color: #14532d; }
    .pill.idle { background: #eee; color: #555; }
    .pill.warn { background: #fff3bf; color: #7a5200; }
    .progress-track { height: 8px; background: #ececec; border-radius: 999px; overflow: hidden; min-width: 96px; }
    .progress-fill { height: 100%; background: var(--color-lime); border-radius: 999px; }
    .empty-state { padding: 40px; text-align: center; color: #777; }
    @media (max-width: 900px) {
      .admin-shell { padding: 24px 18px; }
      .admin-head { align-items: stretch; flex-direction: column; }
      .admin-grid { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
      .admin-input { min-width: 100%; }
      .admin-top-links { display: none; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-logo"><a href="/"><span>AL</span> AdaptLearn</a></div>
    <ul class="admin-top-links">
      <li><a href="admin-dashboard.html" class="active">管理總覽</a></li>
      <li><a href="index.html">學習路徑</a></li>
    </ul>
    <div class="navbar-right" id="nav-right"></div>
  </nav>

  <main class="admin-shell">
    <div class="admin-wrap">
      <div class="admin-head">
        <div>
          <div class="admin-title">學生使用狀況</div>
          <div class="admin-subtitle">管理人員可快速查看學生進度、評量表現與最近活動。</div>
        </div>
        <div class="admin-tools">
          <input class="admin-input" id="search-input" type="search" placeholder="搜尋姓名、Email、學號" />
          <select class="admin-select" id="status-filter">
            <option value="all">全部學生</option>
            <option value="active">已有活動</option>
            <option value="idle">尚未開始</option>
            <option value="inactive">停用帳號</option>
          </select>
        </div>
      </div>

      <section class="admin-grid">
        <div class="admin-stat"><strong id="stat-students">-</strong><span>學生總數</span></div>
        <div class="admin-stat"><strong id="stat-active">-</strong><span>已有活動</span></div>
        <div class="admin-stat"><strong id="stat-attempts">-</strong><span>作答次數</span></div>
        <div class="admin-stat"><strong id="stat-score">-</strong><span>平均分數</span></div>
        <div class="admin-stat"><strong id="stat-units">-</strong><span>平均完成單元</span></div>
      </section>

      <section class="admin-panel">
        <div class="table-scroll">
          <table class="admin-table">
            <thead>
              <tr>
                <th>學生</th>
                <th>狀態</th>
                <th>完成單元</th>
                <th>平均分數</th>
                <th>通過率</th>
                <th>目前位置</th>
                <th>推薦數</th>
                <th>最近活動</th>
              </tr>
            </thead>
            <tbody id="students-body">
              <tr><td colspan="8" class="empty-state">載入中...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    if (!localStorage.getItem('access_token')) window.location.href = 'login.html';

    let allStudents = [];

    function formatNumber(value, fallback = '-') {
      return value === null || value === undefined ? fallback : value;
    }

    function formatDate(value) {
      if (!value) return '尚未活動';
      return new Date(value).toLocaleString('zh-TW', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
      });
    }

    function levelLabel(level) {
      return level ? `Level ${level}` : '尚未開始';
    }

    function renderStats(overview) {
      document.getElementById('stat-students').textContent = overview.student_count;
      document.getElementById('stat-active').textContent = overview.active_students;
      document.getElementById('stat-attempts').textContent = overview.total_attempts;
      document.getElementById('stat-score').textContent = formatNumber(overview.avg_score);
      document.getElementById('stat-units').textContent = `${overview.avg_completed_units} / 8`;
    }

    function getFilteredStudents() {
      const q = document.getElementById('search-input').value.trim().toLowerCase();
      const status = document.getElementById('status-filter').value;
      return allStudents.filter(s => {
        const keywordMatch = !q || [s.username, s.email, s.student_id]
          .filter(Boolean)
          .some(v => String(v).toLowerCase().includes(q));
        const statusMatch =
          status === 'all' ||
          (status === 'active' && s.last_activity) ||
          (status === 'idle' && !s.last_activity) ||
          (status === 'inactive' && !s.is_active);
        return keywordMatch && statusMatch;
      });
    }

    function renderStudents() {
      const rows = getFilteredStudents();
      const body = document.getElementById('students-body');
      if (!rows.length) {
        body.innerHTML = '<tr><td colspan="8" class="empty-state">沒有符合條件的學生</td></tr>';
        return;
      }
      body.innerHTML = rows.map(s => {
        const unitPct = Math.round((s.completed_units / 8) * 100);
        const statusClass = !s.is_active ? 'warn' : s.last_activity ? 'ok' : 'idle';
        const statusText = !s.is_active ? '停用' : s.last_activity ? '已有活動' : '尚未開始';
        return `
          <tr>
            <td>
              <div class="student-name">${s.username}</div>
              <div class="student-meta">${s.email || '未填 Email'}${s.student_id ? ` · ${s.student_id}` : ''}</div>
            </td>
            <td><span class="pill ${statusClass}">${statusText}</span></td>
            <td>
              <div style="display:flex;align-items:center;gap:10px">
                <span style="font-weight:800">${s.completed_units} / 8</span>
                <div class="progress-track"><div class="progress-fill" style="width:${unitPct}%"></div></div>
              </div>
            </td>
            <td>${formatNumber(s.avg_score)}</td>
            <td>${s.pass_rate === null || s.pass_rate === undefined ? '-' : `${s.pass_rate}%`}</td>
            <td>Unit ${s.current_unit || '-'} · ${levelLabel(s.current_level)}</td>
            <td>${s.active_recommendations}</td>
            <td>${formatDate(s.last_activity)}</td>
          </tr>
        `;
      }).join('');
    }

    async function loadAdminDashboard() {
      const profile = await AuthAPI.getProfile();
      if (!profile || profile.role !== 'admin') {
        showToast('此頁面僅限管理員使用', 'error');
        setTimeout(() => window.location.href = '/', 800);
        return;
      }

      const res = await apiFetch('/auth/admin/student-usage/');
      if (!res || !res.ok) {
        showToast('無法載入學生使用狀況', 'error');
        return;
      }
      const data = await res.json();
      allStudents = data.students || [];
      renderStats(data.overview || {});
      renderStudents();
    }

    document.getElementById('search-input').addEventListener('input', renderStudents);
    document.getElementById('status-filter').addEventListener('change', renderStudents);
    loadAdminDashboard();
  </script>
</body>
</html>
