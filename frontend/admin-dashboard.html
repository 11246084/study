<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<title>研究分析儀表板 — AdaptLearn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FBFAF6;
    --panel: #FFFFFF;
    --panel-2: #F6F3EC;
    --line: #E7E3DA;
    --line-strong: #D8D2C4;
    --ink: #1a1814;
    --ink-2: #4a463e;
    --muted: #8a8478;
    --muted-2: #b5ad9b;
    --blue: #2b5fa8;
    --blue-soft: #e6edf7;
    --red: #b6432e;
    --red-soft: #f4e3dd;
    --green: #4a7c54;
    --green-soft: #e2ecd9;
    --amber: #b07a16;
    --amber-soft: #f4ead0;
    --serif: "Inter", "Noto Sans TC", "PingFang TC", sans-serif;
    --sans:  "Inter", "Noto Sans TC", "PingFang TC", sans-serif;
    --mono: "Roboto Mono", ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; }

  .wrap { max-width: 1440px; margin: 0 auto; padding: 30px 40px 80px; }

  .page-head { display: flex; align-items: end; justify-content: space-between; margin-bottom: 26px; gap: 24px; flex-wrap: wrap; }
  .page-head h1 { font-family: var(--serif); font-weight: 800; font-size: 30px; margin: 0 0 6px; letter-spacing: 0.5px; }
  .page-head p { color: var(--muted); font-size: 13.5px; margin: 0; max-width: 660px; line-height: 1.7; }
  .page-head .meta { text-align: right; color: var(--muted); font-size: 12px; line-height: 1.7; font-family: var(--mono); white-space: nowrap; }
  .page-head .meta b { color: var(--ink); font-weight: 500; }

  /* KPI strip */
  .kpis { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 32px; }
  .kpi { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 16px 18px; }
  .kpi .label { font-size: 12px; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 8px; }
  .kpi .value { font-family: var(--mono); font-size: 26px; font-weight: 500; color: var(--ink); line-height: 1; }
  .kpi .value small { font-size: 14px; color: var(--muted); }
  .kpi .delta { font-family: var(--mono); font-size: 11px; margin-top: 6px; color: var(--muted); }
  .kpi.aw .value { color: var(--muted-2); }
  @media (max-width: 1100px) { .kpis { grid-template-columns: repeat(3, 1fr); } }

  /* Grid */
  .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 18px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 22px 24px 24px; min-width: 0; }
  .card.wide-8 { grid-column: span 8; }
  .card.wide-7 { grid-column: span 7; }
  .card.wide-6 { grid-column: span 6; }
  .card.wide-5 { grid-column: span 5; }
  .card.wide-4 { grid-column: span 4; }
  .card.wide-12 { grid-column: span 12; }
  @media (max-width: 1080px) { .card[class*="wide-"] { grid-column: span 12; } }

  .card-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; gap: 10px; }
  .card-tag { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  .card-title { font-family: var(--serif); font-weight: 700; font-size: 19px; margin: 4px 0 2px; letter-spacing: -0.2px; }
  .card-sub { color: var(--muted); font-size: 13px; margin: 0 0 18px; line-height: 1.6; }
  .card-foot { margin-top: 16px; padding-top: 14px; border-top: 1px dashed var(--line-strong); font-size: 12.5px; color: var(--ink-2); line-height: 1.7; }
  .card-foot b { color: var(--ink); font-weight: 500; }
  .card-foot .kw { font-family: var(--mono); color: var(--blue); }

  .axis-label { fill: var(--muted); font-size: 11px; font-family: var(--mono); }
  .grid-line { stroke: var(--line); stroke-width: 1; }

  .legend { display: flex; flex-wrap: wrap; gap: 12px 20px; margin-top: 14px; }
  .legend .item { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--ink-2); }
  .legend .sw { width: 16px; height: 4px; border-radius: 2px; }
  .legend .pct { font-family: var(--mono); color: var(--muted); margin-left: 4px; font-size: 11.5px; }

  .tag { display: inline-block; font-family: var(--mono); font-size: 10.5px; letter-spacing: 1px; padding: 3px 8px; border-radius: 3px; vertical-align: middle; }
  .tag.todo { background: var(--amber-soft); color: var(--amber); }
  .tag.done { background: var(--green-soft); color: var(--green); }
  .tag.warn { background: var(--red-soft); color: var(--red); }
  .tag.info { background: var(--blue-soft); color: var(--blue); }
  .scope { display: inline-block; margin-left: 8px; font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 3px; letter-spacing: 1px; vertical-align: 2px; }
  .scope.cls { background: var(--blue-soft); color: var(--blue); }
  .scope.ind { background: var(--green-soft); color: var(--green); }
  .scope.both { background: var(--amber-soft); color: var(--amber); }

  /* Unit difficulty bar list */
  .ulist { display: flex; flex-direction: column; gap: 13px; margin-top: 4px; }
  .ulist .row { display: grid; grid-template-columns: 96px 1fr 60px; gap: 14px; align-items: center; font-size: 13px; }
  .ulist .row .u { font-family: var(--mono); color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ulist .row .bar { height: 18px; background: var(--panel-2); border-radius: 4px; overflow: hidden; }
  .ulist .row .bar > div { height: 100%; background: var(--ink); border-radius: 4px; transition: width 0.4s; }
  .ulist .row.alert .u { color: var(--red); }
  .ulist .row.alert .bar > div { background: var(--red); }
  .ulist .row .v { font-family: var(--mono); text-align: right; }
  .ulist .row .v .pct { color: var(--muted); margin-left: 2px; }

  /* Misconception table */
  table.misc { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.misc th { text-align: left; font-weight: 500; color: var(--muted); font-size: 11px; letter-spacing: 1px; padding: 8px 10px; border-bottom: 1px solid var(--line); }
  table.misc td { padding: 11px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
  table.misc tr:last-child td { border-bottom: none; }
  table.misc .unit { font-family: var(--mono); color: var(--muted); font-size: 12px; white-space: nowrap; }
  table.misc .quote .wrong { color: var(--red); margin-right: 4px; }
  table.misc .freq { font-family: var(--mono); font-size: 13px; text-align: right; white-space: nowrap; }
  table.misc .bar > div { height: 6px; background: var(--red-soft); border-radius: 3px; overflow: hidden; min-width: 80px; }
  table.misc .bar > div > div { height: 100%; background: var(--red); border-radius: 3px; }

  /* Risk segmented bar */
  .pm-bar { display: flex; height: 26px; border-radius: 4px; overflow: hidden; margin: 4px 0 8px; }
  .pm-bar .seg { display: flex; align-items: center; justify-content: center; color: white; font-family: var(--mono); font-size: 12px; }
  .pm-bar .h { background: var(--red); } .pm-bar .m { background: var(--amber); } .pm-bar .l { background: var(--green); }
  .risk-list { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
  .risk-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; background: var(--red-soft); border-left: 3px solid var(--red); padding: 8px 12px; border-radius: 0 6px 6px 0; }
  .risk-item .s { font-family: var(--mono); color: var(--red); }

  /* Awaiting state */
  .awaiting { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px 18px; min-height: 160px; border: 1px dashed var(--line-strong); border-radius: 10px; background: var(--panel-2); }
  .awaiting .aw-icon { font-size: 26px; opacity: 0.5; margin-bottom: 10px; }
  .awaiting .aw-title { font-weight: 700; color: var(--ink-2); font-size: 14px; margin-bottom: 6px; }
  .awaiting .aw-note { font-size: 12.5px; color: var(--muted); max-width: 320px; line-height: 1.6; }
  .awaiting .aw-rec { margin-top: 12px; font-family: var(--mono); font-size: 11px; color: var(--green); background: var(--green-soft); padding: 4px 10px; border-radius: 999px; }

  /* Section header */
  .sect-head { grid-column: span 12; display: flex; align-items: baseline; gap: 14px; margin: 22px 0 -4px; }
  .sect-head .n { font-family: var(--mono); color: var(--muted); font-size: 12px; letter-spacing: 1px; }
  .sect-head h2 { font-family: var(--serif); font-weight: 700; font-size: 17px; margin: 0; }
  .sect-head .rule { flex: 1; height: 1px; background: var(--line); }

  /* Student case */
  .case-head { display: flex; align-items: center; gap: 16px; padding: 16px 22px; border-bottom: 1px solid var(--line); background: var(--panel-2); border-radius: 12px 12px 0 0; flex-wrap: wrap; }
  .case-head .ava { width: 44px; height: 44px; border-radius: 50%; background: var(--ink); color: var(--panel); display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 17px; font-weight: 700; }
  .case-head select { font-family: var(--sans); font-size: 14px; padding: 7px 10px; border: 1px solid var(--line-strong); border-radius: 6px; background: var(--panel); color: var(--ink); }
  .case-grid { display: grid; grid-template-columns: 1fr 1.3fr 1.2fr; gap: 0; }
  @media (max-width: 980px) { .case-grid { grid-template-columns: 1fr; } }
  .case-col { padding: 20px 22px; border-right: 1px solid var(--line); }
  .case-col:last-child { border-right: none; }
  .col-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 14px; }
  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 18px; }
  .metric .ml { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .metric .mv { font-family: var(--mono); font-size: 20px; }
  .metric .mv small { font-size: 13px; color: var(--muted); }
  .hit-row { display: flex; align-items: center; gap: 10px; font-size: 13px; margin-bottom: 9px; }
  .hit-row .x { width: 18px; height: 18px; border-radius: 4px; background: var(--red); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
  .hit-row .t { flex: 1; min-width: 0; }
  .hit-row .st { font-family: var(--mono); font-size: 11px; }
  .hit-row .st.done { color: var(--green); } .hit-row .st.todo { color: var(--amber); }

  .foot { color: var(--muted); font-size: 12px; text-align: center; margin-top: 40px; font-family: var(--mono); letter-spacing: 0.5px; }
  .loading { color: var(--muted); font-size: 13px; padding: 40px; text-align: center; }
  .blocked { padding: 60px 40px; text-align: center; color: var(--ink-2); }
  .blocked a { display: inline-block; margin-top: 16px; background: var(--ink); color: var(--panel); padding: 10px 22px; border-radius: 999px; text-decoration: none; font-weight: 700; font-size: 14px; }
</style>
</head>
<body>
  <main class="wrap" id="root">
    <div class="loading">載入研究分析資料中…</div>
  </main>

  <script src="js/api.js"></script>
  <script>
    const IS_EMBEDDED = new URLSearchParams(window.location.search).get('embedded') === '1';

    // 直接以非 embedded、最上層開啟 → 導回管理外殼（保留左側導覽列）
    if (!IS_EMBEDDED && window.self === window.top) {
      window.location.replace('/admin-shell.html#analytics');
    }

    const root = document.getElementById('root');
    const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    const num = (v, d='—') => (v === null || v === undefined) ? d : v;
    function fmtDate(v) { return v ? new Date(v).toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit' }) : '—'; }

    function awaiting(note, recording) {
      return `<div class="awaiting">
        <div class="aw-icon">📊</div>
        <div class="aw-title">資料累積中</div>
        <div class="aw-note">${esc(note)}</div>
        ${recording ? `<div class="aw-rec">✓ 正在記錄：${esc(recording)}</div>` : ''}
      </div>`;
    }

    // ── KPI strip ──────────────────────────────────────────────
    function renderKpis(kpis) {
      return `<div class="kpis">${kpis.map(k => `
        <div class="kpi ${k.status === 'awaiting' ? 'aw' : ''}">
          <div class="label">${esc(k.label)}</div>
          <div class="value">${num(k.value)}<small>${esc(k.unit || '')}</small></div>
          <div class="delta">${k.status === 'awaiting' ? (k.note || '等待累積') : '真實資料'}</div>
        </div>`).join('')}</div>`;
    }

    // ── A. 單元難度 ────────────────────────────────────────────
    function renderUnitDifficulty(d) {
      const body = d.status !== 'ready'
        ? awaiting('尚無作答資料，學生開始作答後即顯示各單元答對率。', '答對率（Answer.is_correct）')
        : `<div class="ulist">${d.rows.map(r => `
            <div class="row ${r.alert ? 'alert' : ''}">
              <span class="u" title="${esc(r.title)}">U${r.unit} ${esc(r.title)}</span>
              <div class="bar"><div style="width:${r.rate ?? 0}%"></div></div>
              <span class="v">${r.rate === null ? '—' : r.rate}<span class="pct">%</span></span>
            </div>`).join('')}</div>`;
      const alerts = (d.rows || []).filter(r => r.alert);
      return card('wide-4', 'RQ-03 · 單元難度', 'cls', '班級',
        '單元難度與瓶頸', '逐單元平均答對率，低於 60% 視為概念斷層。', body,
        alerts.length ? `<b>瓶頸單元：</b>${alerts.map(a => `U${a.unit}`).join('、')}，建議補強鷹架與試題分析。` : '目前無低於 60% 的瓶頸單元。');
    }

    // ── A. 軌跡分群（awaiting）─────────────────────────────────
    function renderClustering(d) {
      return card('wide-8', 'RQ-01 · 學習軌跡分群', 'both', '班級 → 個人',
        '學習軌跡分群', '將各生八單元精熟度疊加後做 k-means 分群，識別成長型／困難型／不穩定型。',
        awaiting(d.note, '每生各單元 level（AdaptiveLearningPath）'),
        '需 <span class="kw">scikit-learn</span> 分群與足夠樣本數；原料已在累積，待 N 足夠即可離線跑分群。');
    }

    // ── B. 迷思概念 ────────────────────────────────────────────
    function renderMisconceptions(d) {
      const max = Math.max(1, ...(d.rows || []).map(r => r.count));
      const body = d.status !== 'ready'
        ? awaiting('尚無簡答題錯誤資料；中級簡答題作答後自動萃取常見錯誤敘述。', '簡答錯誤原文（Answer.student_answer）')
        : `<table class="misc"><thead><tr><th>單元</th><th>學生常見錯誤敘述</th><th class="bar">出現率</th><th class="freq">n</th></tr></thead>
           <tbody>${d.rows.map(r => `<tr>
             <td class="unit">U${r.unit} ${esc(r.title)}</td>
             <td class="quote"><span class="wrong">✗</span>「${esc(r.text)}」</td>
             <td class="bar"><div><div style="width:${Math.round(r.count / max * 100)}%"></div></div></td>
             <td class="freq">${r.count} / ${r.total}</td></tr>`).join('')}</tbody></table>`;
      return card('wide-7', 'RQ-02 · 迷思概念萃取', 'cls', '班級',
        '常見迷思概念', '從簡答題錯誤答案萃取共同錯誤書寫，依出現次數排序。', body,
        '此為真實作答資料，可直接用於論文「常見迷思」章節與教材補強建議。');
    }

    // ── B. 重測效果 ────────────────────────────────────────────
    function renderRetake(d) {
      let body;
      if (d.status !== 'ready') {
        body = awaiting('尚無重做紀錄；學生對同一份評量作答第二次後即可比較進步幅度。', '多次作答（QuizAttempt）');
      } else {
        const units = d.units || [];
        const W = 460, H = 200, base = 180, scale = 1.3;
        const groupW = units.length ? Math.min(100, (W - 60) / units.length) : 0;
        let bars = '';
        units.forEach((u, i) => {
          const x = 50 + i * groupW;
          const h1 = u.first * scale, h2 = u.second * scale;
          bars += `<rect x="${x}" y="${base - h1}" width="18" height="${h1}" fill="var(--muted-2)" rx="2"/>
                   <rect x="${x + 22}" y="${base - h2}" width="18" height="${h2}" fill="var(--green)" rx="2"/>
                   <text x="${x + 20}" y="${base + 15}" text-anchor="middle" class="axis-label">U${u.unit}</text>
                   <text x="${x + 9}" y="${base - h1 - 4}" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="var(--ink)">${u.first}</text>
                   <text x="${x + 31}" y="${base - h2 - 4}" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="var(--green)">${u.second}</text>`;
        });
        body = `<svg viewBox="0 0 ${W} ${H}" width="100%" height="200">
            <line class="grid-line" x1="40" y1="50" x2="${W}" y2="50"/>
            <line class="grid-line" x1="40" y1="115" x2="${W}" y2="115"/>
            <line class="grid-line" x1="40" y1="180" x2="${W}" y2="180"/>
            <text x="34" y="54" text-anchor="end" class="axis-label">100</text>
            <text x="34" y="119" text-anchor="end" class="axis-label">50</text>
            ${bars}
          </svg>
          <div class="legend">
            <div class="item"><span class="sw" style="background:var(--muted-2)"></span>第 1 次作答（avg ${d.avg_first}）</div>
            <div class="item"><span class="sw" style="background:var(--green)"></span>第 2 次作答（avg ${d.avg_second}）</div>
          </div>`;
      }
      const foot = d.status === 'ready'
        ? `共 <b>${d.n_pairs}</b> 組重測；第二次平均 ${d.avg_second} 分，較第一次 <b>${(d.avg_second - d.avg_first).toFixed(1)}</b> 分。`
        : '形成性評量已允許多次提交，重做後第 1／2 次分數會自動在此比較。';
      return card('wide-5', 'RQ-07 · 形成性重測效果', 'both', '班級 + 個人',
        '形成性評量重測效果', '比較同一評量第 1 次與第 2 次作答的平均分數。', body, foot);
    }

    // ── C. 推薦接受度 ──────────────────────────────────────────
    function renderRecUptake(d) {
      const body = d.status !== 'ready'
        ? awaiting('尚無推薦點擊紀錄；學生點擊推薦卡後即開始累積接受度資料。', '推薦點擊（is_clicked / clicked_at）')
        : `<div style="font-family:var(--mono);font-size:34px;margin:6px 0 4px">${d.click_rate}<small style="font-size:16px;color:var(--muted)">%</small></div>
           <div style="font-size:13px;color:var(--muted)">${d.clicked} / ${d.total} 張推薦卡被點擊 · 忽略 ${d.ignored}</div>`;
      return card('wide-6', 'RQ-04 · 推薦接受度', 'cls', '班級',
        '推薦接受度', '比較有點擊推薦卡與忽略的學生後續表現差異。', body,
        '本次已新增 <span class="kw">is_clicked</span>／<span class="kw">clicked_at</span> 欄位，點擊資料從現在開始記錄。');
    }

    // ── C. 投入度（awaiting）───────────────────────────────────
    function renderEngagement(d) {
      let body;
      if (d.status !== 'ready') {
        body = awaiting('尚無線上時數資料；學生瀏覽教材後開始累積投入度。', '線上時數 / 教材瀏覽次數 / 登入次數');
      } else {
        const pts = d.points;
        const maxH = Math.max(10, ...pts.map(p => p.hours));
        body = `<svg viewBox="0 0 460 200" width="100%" height="200">
          <line class="grid-line" x1="40" y1="50" x2="450" y2="50"/>
          <line class="grid-line" x1="40" y1="125" x2="450" y2="125"/>
          ${pts.map(p => `<circle cx="${40 + p.hours / maxH * 400}" cy="${180 - p.score * 1.3}" r="4" fill="var(--ink)" opacity="0.7"/>`).join('')}
          <text x="245" y="198" text-anchor="middle" class="axis-label">線上總時數 (h)</text>
        </svg>`;
      }
      return card('wide-6', 'RQ-05 · 投入度 × 學習成效', 'cls', '班級',
        '學習時間與分數關係', '投入時間過少或過多（仍掙扎）皆可能低分，呈現 U 型。', body,
        '本次已埋點 <span class="kw">time_spent</span>／<span class="kw">visit_count</span>／<span class="kw">login_count</span> 作為投入度代理變數。');
    }

    // ── C. 早期預警（規則式）──────────────────────────────────
    function renderRisk(d) {
      let body;
      if (d.status !== 'ready') {
        body = awaiting('尚無前三單元作答資料；累積後以規則式標記高風險學生。', '前 3 單元平均分');
      } else {
        const total = Math.max(1, d.high + d.mid + d.low);
        body = `<div class="pm-bar">
            ${d.high ? `<div class="seg h" style="width:${d.high / total * 100}%">${d.high}</div>` : ''}
            ${d.mid ? `<div class="seg m" style="width:${d.mid / total * 100}%">${d.mid}</div>` : ''}
            ${d.low ? `<div class="seg l" style="width:${d.low / total * 100}%">${d.low}</div>` : ''}
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-family:var(--mono)">
            <span>高風險 ${d.high}</span><span>中風險 ${d.mid}</span><span>低風險 ${d.low}</span>
          </div>
          ${d.high_list && d.high_list.length ? `<div class="risk-list">${d.high_list.map(s => `
            <div class="risk-item"><span>${esc(s.username)}</span><span class="s">前三單元 ${s.score} 分</span></div>`).join('')}</div>` : ''}`;
      }
      return card('wide-7', 'RQ-06 · 早期預警', 'both', '班級 → 個人',
        '早期預警（規則式初版）', '以前三單元平均分標記風險：<60 高、60–75 中、>75 低。', body,
        '此為規則式初版；累積足夠樣本後可升級為 <span class="kw">邏輯斯迴歸</span> 模型（特徵重要性、ACC/AUC）。');
    }

    // ── D. 性別差異（awaiting）─────────────────────────────────
    function renderGender(d) {
      const body = d.status !== 'ready'
        ? awaiting(`尚有 ${d.missing} 位學生未填性別；註冊頁已加入性別欄位。`, 'User.gender')
        : `<div class="ulist">${d.rows.map(r => `
            <div class="row"><span class="u">${esc(r.label)}（n=${r.n}）</span>
            <div class="bar"><div style="width:${r.avg ?? 0}%;background:var(--blue)"></div></div>
            <span class="v">${num(r.avg)}<span class="pct">分</span></span></div>`).join('')}
            ${d.missing ? `<div style="font-size:11.5px;color:var(--muted);margin-top:4px">尚有 ${d.missing} 位未填性別</div>` : ''}</div>`;
      return card('wide-5', 'RQ-08 · 子群分析', 'cls', '班級',
        '性別差異', '資訊教育研究經典子題；本次已於註冊頁新增性別欄位。', body,
        '本次已新增 <span class="kw">User.gender</span>，新註冊學生會自動帶入，既有帳號可於資料管理補填。');
    }

    // ── D. 前後測問卷（六大構念）──────────────────────────────
    function deltaBadge(s) {
      if (s.delta === null || s.delta === undefined) {
        return s.post_only ? '<span style="color:var(--muted)">僅後測</span>' : '<span style="color:var(--muted)">—</span>';
      }
      const up = s.delta > 0;
      const cls = s.improved ? 'var(--green)' : (s.improved === false ? '#c0392b' : 'var(--muted)');
      const txt = s.improved ? '變好' : (s.improved === false ? '退步' : '持平');
      return `<span style="color:${cls};font-family:var(--mono);font-weight:700">${up ? '▲' : (s.delta < 0 ? '▼' : '◆')} ${s.delta > 0 ? '+' : ''}${s.delta}</span> <span style="color:${cls};font-size:11px">${txt}</span>`;
    }
    function ppBar(v, s) {
      const span = (s.score_max - s.score_min) || 1;
      return v === null || v === undefined ? 0 : Math.max(0, Math.min(100, (v - s.score_min) / span * 100));
    }
    function renderQuestionnaire(d) {
      const body = d.status !== 'ready'
        ? awaiting(d.note || '尚未登錄問卷成績。', '問卷成績（SurveyScore，前/後測）')
        : `<table class="misc"><thead><tr><th>構念</th><th>前測</th><th>後測</th><th class="bar">前→後</th><th>變化</th></tr></thead>
           <tbody>${d.scales.map(s => `<tr>
             <td class="unit">${esc(s.group ? s.group + '·' : '')}${esc(s.name)}${s.higher_is_better ? '' : ' <span style="color:var(--muted);font-size:10px">↓佳</span>'}</td>
             <td style="font-family:var(--mono)">${num(s.pre)}</td>
             <td style="font-family:var(--mono)">${num(s.post)}</td>
             <td class="bar"><div style="position:relative;height:12px">
               <div style="position:absolute;top:1px;height:4px;width:${ppBar(s.pre, s)}%;background:var(--muted-2);border-radius:2px"></div>
               <div style="position:absolute;top:7px;height:4px;width:${ppBar(s.post, s)}%;background:var(--green);border-radius:2px"></div>
             </div></td>
             <td>${deltaBadge(s)}</td></tr>`).join('')}</tbody></table>
           <div class="legend"><div class="item"><span class="sw" style="background:var(--muted-2)"></span>前測</div><div class="item"><span class="sw" style="background:var(--green)"></span>後測</div></div>`;
      return card('wide-7', 'RQ-09 · 前後測問卷', 'cls', '班級',
        '六大構念 · 前後測變化', '動機／焦慮／自我學習傾向／批判思考傾向／解決問題傾向／系統可行性，配對前後測。', body,
        d.status === 'ready'
          ? '焦慮、無動機為「分數越低越好」，已自動依方向判定變好／退步；可於外部統計工具做配對樣本 t 檢定。'
          : '請於左側「問卷成績」分頁登錄前後測分數，或用 CSV 匯入後此處自動呈現。');
    }

    // ── C. 使用時間 / 次數（RQ-05）─────────────────────────────
    function renderUsage(d) {
      let body;
      if (d.status !== 'ready') {
        body = awaiting(d.note || '尚無使用時段資料。', '使用時段（StudySession 心跳）');
      } else {
        const wk = d.weekly || [];
        const maxMin = Math.max(1, ...wk.map(w => w.minutes));
        const maxSes = Math.max(1, ...wk.map(w => w.sessions));
        const bw = wk.length ? Math.min(70, 420 / wk.length) : 0;
        let bars = '';
        wk.forEach((w, i) => {
          const x = 46 + i * bw;
          const h = w.minutes / maxMin * 120;
          bars += `<rect x="${x}" y="${160 - h}" width="${Math.max(8, bw - 14)}" height="${h}" fill="var(--ink)" opacity="0.78" rx="2"/>
                   <text x="${x + (bw - 14) / 2}" y="${172}" text-anchor="middle" class="axis-label" font-size="8">${esc(w.week.slice(5))}</text>
                   <text x="${x + (bw - 14) / 2}" y="${156 - h}" text-anchor="middle" font-family="var(--mono)" font-size="8" fill="var(--ink)">${w.minutes}</text>`;
        });
        body = `<div class="metric-grid" style="margin-bottom:14px">
            <div class="metric"><div class="ml">每次使用長度</div><div class="mv">${num(d.avg_session_minutes)}<small> 分</small></div></div>
            <div class="metric"><div class="ml">每週使用次數</div><div class="mv">${num(d.avg_sessions_per_active_week)}<small> 次</small></div></div>
            <div class="metric"><div class="ml">每週使用時長</div><div class="mv">${num(d.avg_minutes_per_active_week)}<small> 分</small></div></div>
            <div class="metric"><div class="ml">累計時段</div><div class="mv">${d.sessions_total}<small> 段</small></div></div>
          </div>
          <svg viewBox="0 0 470 180" width="100%" height="170">
            <line class="grid-line" x1="40" y1="40" x2="465" y2="40"/>
            <line class="grid-line" x1="40" y1="100" x2="465" y2="100"/>
            <line class="grid-line" x1="40" y1="160" x2="465" y2="160"/>
            ${bars}
            <text x="245" y="${179}" text-anchor="middle" class="axis-label">每週使用時長（分鐘）</text>
          </svg>`;
      }
      return card('wide-6', 'RQ-05 · 使用時間與次數', 'both', '班級 + 個人',
        '使用時間與次數', '每週使用次數／時長、每次平均使用長度（以 30 分鐘間隔切分時段）。', body,
        '心跳每 2 分鐘記錄一次，距上次活動超過 30 分鐘視為新的一段使用。');
    }

    // ── B. 解題能力（建構型題目）──────────────────────────────
    function renderProblemSolving(d) {
      let body;
      if (d.status !== 'ready') {
        body = awaiting(d.note || '尚無建構型題目作答資料。', '簡答／程式題作答（Answer）');
      } else {
        const units = d.by_unit || [];
        body = `<div style="display:flex;gap:18px;align-items:baseline;margin-bottom:10px">
            <div><div style="font-family:var(--mono);font-size:32px">${num(d.short_answer_accuracy)}<small style="font-size:15px;color:var(--muted)">%</small></div>
            <div style="font-size:12px;color:var(--muted)">簡答題答對率（n=${d.short_answer_n}）</div></div>
            <div style="margin-left:auto;text-align:right"><div style="font-family:var(--mono);font-size:20px">${d.coding_submissions}</div>
            <div style="font-size:11.5px;color:var(--muted)">程式題提交數</div></div>
          </div>
          ${units.length ? `<div class="ulist">${units.map(u => `
            <div class="row"><span class="u">U${u.unit} ${esc(u.title)}</span>
            <div class="bar"><div style="width:${u.rate ?? 0}%;background:var(--blue)"></div></div>
            <span class="v">${num(u.rate)}<span class="pct">%</span></span></div>`).join('')}</div>` : ''}`;
      }
      return card('wide-5', 'RQ · 解決問題能力', 'both', '班級 + 個人',
        '解決問題能力', '以建構型題目（簡答＋程式）作答表現衡量。', body,
        '簡答題為自動比對答對率；程式題提交即計，教師另行複閱品質。');
    }

    // ── 學生個案用的小區塊 ─────────────────────────────────────
    function qMini(q) {
      if (!q || q.status !== 'ready') return awaiting((q && q.note) || '尚未登錄此學生問卷成績。', null);
      return `<table class="misc" style="font-size:11.5px"><tbody>${q.scales.map(s => `<tr>
        <td class="unit" style="padding:5px 6px">${esc(s.group ? s.group + '·' : '')}${esc(s.name)}</td>
        <td style="font-family:var(--mono);padding:5px 6px">${num(s.pre)} → ${num(s.post)}</td>
        <td style="padding:5px 6px">${deltaBadge(s)}</td></tr>`).join('')}</tbody></table>`;
    }
    function usageMini(u) {
      if (!u || u.status !== 'ready') return awaiting((u && u.note) || '尚無使用時段資料。', null);
      return `<div class="metric-grid">
        <div class="metric"><div class="ml">每次使用</div><div class="mv">${num(u.avg_session_minutes)}<small> 分</small></div></div>
        <div class="metric"><div class="ml">每週次數</div><div class="mv">${num(u.avg_sessions_per_active_week)}<small> 次</small></div></div>
        <div class="metric"><div class="ml">每週時長</div><div class="mv">${num(u.avg_minutes_per_active_week)}<small> 分</small></div></div>
        <div class="metric"><div class="ml">累計時段</div><div class="mv">${u.sessions_total}<small> 段</small></div></div>
      </div>`;
    }
    function psMini(p) {
      if (!p || p.status !== 'ready') return awaiting((p && p.note) || '尚無建構型題目作答。', null);
      return `<div style="font-family:var(--mono);font-size:24px">${num(p.short_answer_accuracy)}<small style="font-size:13px;color:var(--muted)">%</small></div>
        <div style="font-size:11.5px;color:var(--muted)">簡答答對率（n=${p.short_answer_n}）· 班均 ${num(p.class_short_answer_accuracy)}%</div>
        <div style="font-size:11.5px;color:var(--muted);margin-top:4px">程式題提交 ${p.coding_submissions} 次</div>`;
    }

    // ── E. 學生個案 ────────────────────────────────────────────
    let studentList = [];
    function renderStudentCase(initialId) {
      return `<section class="card wide-12" style="padding:0">
        <div class="case-head">
          <div class="ava" id="case-ava">—</div>
          <div>
            <div style="font-family:var(--serif);font-size:17px;font-weight:700" id="case-name">選擇學生</div>
            <div style="font-size:12.5px;color:var(--muted)" id="case-sub">同一筆資料切換到單一學生視角</div>
          </div>
          <div style="margin-left:auto">
            <select id="case-select">
              <option value="">— 選擇學生 —</option>
              ${studentList.map(s => `<option value="${s.id}" ${s.id === initialId ? 'selected' : ''}>${esc(s.username)}</option>`).join('')}
            </select>
          </div>
        </div>
        <div id="case-body"><div class="loading">請從右上選擇一位學生</div></div>
        <div class="card-foot" style="padding:0 24px 22px;border-top:none">
          <b>同一筆資料 · 兩個視角：</b>班級層級為研究貢獻（難度、迷思、預警）；個人層級是老師日常的<span class="kw">學生介入畫面</span>，直接消費上面的班級分析結果。
        </div>
      </section>`;
    }

    async function loadStudentCase(id) {
      const body = document.getElementById('case-body');
      if (!id) { body.innerHTML = '<div class="loading">請從右上選擇一位學生</div>'; return; }
      body.innerHTML = '<div class="loading">載入中…</div>';
      const res = await apiFetch(`/auth/admin/research-analytics/student/${id}/`);
      if (!res || !res.ok) { body.innerHTML = '<div class="loading">載入失敗</div>'; return; }
      const d = await res.json();
      document.getElementById('case-ava').textContent = (d.student.username || '?').charAt(0).toUpperCase();
      document.getElementById('case-name').textContent = d.student.username;
      document.getElementById('case-sub').textContent =
        `${d.student.gender || '未填性別'} · ${d.student.student_id || '無學號'} · 註冊於 ${fmtDate(d.student.date_joined)}`;
      const m = d.metrics;
      const traj = d.trajectory.map(t => `U${t.unit}:${t.level ? 'Lv' + t.level : '—'}`).join('  ');
      const hits = d.misconception_hits.length
        ? d.misconception_hits.map(h => `<div class="hit-row"><span class="x">✗</span>
            <span class="t">U${h.unit}「${esc(h.text)}」</span>
            <span class="st ${h.redone ? 'done' : 'todo'}">${h.redone ? '已修正 ✓' : '未重做'}</span></div>`).join('')
        : '<div style="font-size:12.5px;color:var(--muted)">尚無簡答錯誤紀錄</div>';
      const cmp = d.compare;
      body.innerHTML = `<div class="case-grid">
        <div class="case-col">
          <div class="col-label">關鍵指標</div>
          <div class="metric-grid">
            <div class="metric"><div class="ml">完成單元</div><div class="mv">${m.completed_units}<small> / 8</small></div></div>
            <div class="metric"><div class="ml">平均精熟度</div><div class="mv">${num(m.mastery)}<small> /3</small></div></div>
            <div class="metric"><div class="ml">線上時數</div><div class="mv">${m.hours}<small> h</small></div></div>
            <div class="metric"><div class="ml">重做次數</div><div class="mv">${m.retake_count}<small> 次</small></div></div>
          </div>
          <div class="col-label" style="margin-top:22px">與班級對照</div>
          <div style="display:grid;grid-template-columns:60px 1fr 70px;gap:10px;align-items:center;font-size:12px">
            <span style="color:var(--ink-2)">平均分</span>
            <div style="height:6px;background:var(--panel-2);border-radius:3px;position:relative">
              <div style="position:absolute;left:0;top:0;width:${cmp.score ?? 0}%;height:100%;background:var(--blue);border-radius:3px"></div>
              <div style="position:absolute;left:${cmp.class_score ?? 0}%;top:-3px;width:1.5px;height:12px;background:var(--ink)"></div>
            </div>
            <span style="font-family:var(--mono);font-size:11px;text-align:right">${num(cmp.score)} · <span style="color:var(--muted)">班均 ${num(cmp.class_score)}</span></span>
          </div>
        </div>
        <div class="case-col">
          <div class="col-label">個人學習軌跡</div>
          <div style="font-family:var(--mono);font-size:13px;line-height:2;color:var(--ink-2)">${traj}</div>
          <div class="col-label" style="margin-top:18px">六大構念（前→後測）</div>
          ${qMini(d.questionnaire)}
          <div class="col-label" style="margin-top:18px">使用時間</div>
          ${usageMini(d.usage)}
        </div>
        <div class="case-col">
          <div class="col-label">解題能力</div>
          ${psMini(d.problem_solving)}
          <div class="col-label" style="margin-top:18px">迷思命中 · 個人</div>
          ${hits}
        </div>
      </div>`;
    }

    // ── card 組裝器 ────────────────────────────────────────────
    function card(wide, tag, scopeCls, scopeTxt, title, sub, body, foot) {
      return `<section class="card ${wide}">
        <div class="card-head">
          <span class="card-tag">${tag}<span class="scope ${scopeCls}">${scopeTxt}</span></span>
        </div>
        <div class="card-title">${title}</div>
        <p class="card-sub">${sub}</p>
        ${body}
        ${foot ? `<div class="card-foot">${foot}</div>` : ''}
      </section>`;
    }
    function sectHead(n, h) { return `<div class="sect-head"><span class="n">${n}</span><h2>${h}</h2><span class="rule"></span></div>`; }

    // ── 模組定義（一次只顯示一個模組，由左側欄切換）────────────
    const MODULES = {
      behavior: { tag: 'A · 學習行為', sub: '學生如何走過八個單元',
        render: d => renderClustering(d.clustering) + renderUnitDifficulty(d.unit_difficulty) },
      concept: { tag: 'B · 概念與評量', sub: '學生卡在哪、重做有沒有用、解題能力',
        render: d => renderMisconceptions(d.misconceptions) + renderRetake(d.retake) + renderProblemSolving(d.problem_solving) },
      intervention: { tag: 'C · 系統介入與使用', sub: '推薦、投入、使用時間、預警',
        render: d => renderRecUptake(d.recommendation_uptake) + renderEngagement(d.engagement) + renderUsage(d.usage) + renderRisk(d.risk) },
      psych: { tag: 'D · 子群與心理變項', sub: '性別差異與六大構念前後測',
        render: d => renderGender(d.gender) + renderQuestionnaire(d.questionnaire) },
      individual: { tag: 'E · 個人層級', sub: '切換視角 · 同一筆資料看單一學生',
        render: d => renderStudentCase(null) },
    };
    let dashboardData = null;
    let activeModule = new URLSearchParams(window.location.search).get('section') || 'behavior';
    if (!MODULES[activeModule]) activeModule = 'behavior';

    function renderModule(section) {
      if (!dashboardData) return;
      if (!MODULES[section]) section = 'behavior';
      activeModule = section;
      const mod = MODULES[section];
      const grid = document.getElementById('module-grid');
      grid.innerHTML = sectHead(mod.tag, mod.sub) + mod.render(dashboardData);
      if (section === 'individual') {
        const sel = document.getElementById('case-select');
        if (sel) sel.addEventListener('change', e => loadStudentCase(e.target.value));
      }
    }

    async function loadDashboard() {
      const profile = await AuthAPI.getProfile();
      const isAdmin = profile && (profile.role === 'admin' || profile.is_superuser || profile.is_staff);
      if (!isAdmin) {
        root.innerHTML = `<div class="blocked"><div style="font-size:40px;opacity:.4">🔒</div>
          <h2 style="font-family:var(--serif)">此頁面僅限管理員</h2><a href="/login.html">前往登入</a></div>`;
        return;
      }

      const res = await apiFetch('/auth/admin/research-analytics/');
      if (!res || !res.ok) { root.innerHTML = '<div class="loading">⚠️ 資料載入失敗</div>'; return; }
      const d = await res.json();
      dashboardData = d;
      studentList = d.meta.students || [];
      const updated = new Date().toLocaleString('zh-TW', { hour:'2-digit', minute:'2-digit' });

      root.innerHTML = `
        <div class="page-head">
          <div>
            <h1>Python 程式設計 · 學習歷程分析</h1>
            <p>從左側欄選擇分析模組。能由現有資料計算者顯示真實值；尚未累積或需離線統計者標記「資料累積中」，不以模擬數字呈現。</p>
          </div>
          <div class="meta">
            <div>樣本數 <b>N = ${d.meta.N}</b></div>
            <div>單元數 <b>${d.meta.units} units</b></div>
            <div>觀測期 <b>${fmtDate(d.meta.period_start)} – ${fmtDate(d.meta.period_end)}</b></div>
            <div>最後更新 <b>${updated}</b></div>
          </div>
        </div>
        ${renderKpis(d.kpis)}
        <div class="grid" id="module-grid"></div>
        <div class="foot">適性學習研究分析 · 真實資料儀表板</div>`;

      renderModule(activeModule);
    }

    // 接收左側欄切換模組的訊息
    window.addEventListener('message', event => {
      if (event.origin !== window.location.origin) return;
      if (event.data && event.data.type === 'adaptlearn:analytics-section') {
        renderModule(event.data.section);
      }
    });

    loadDashboard();
  </script>
</body>
</html>
