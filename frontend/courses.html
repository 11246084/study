<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>課程列表 — AdaptLearn</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* === Embedded 模式 === */
    body.embedded .navbar,
    body.embedded .footer { display: none !important; }
    body.embedded .section { padding-top: 28px !important; }
    .course-link-card { transition: transform 0.15s, box-shadow 0.15s; }
    .course-link-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  </style>
</head>
<body>
<script>
  // === embedded 偵測 ===
  const IS_EMBEDDED = new URLSearchParams(window.location.search).get('embedded') === '1';
  if (IS_EMBEDDED) document.body.classList.add('embedded');

  // 未登入直接離開（embedded 由 shell 管 auth）
  if (!IS_EMBEDDED && !localStorage.getItem('access_token')) {
    window.location.replace('login.html');
  }
  // 取得 role：學生導回學習中心、admin 非 embedded 直接跳 shell、老師正常
  (async () => {
    const res = await fetch('/api/auth/profile/', {
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
    });
    if (res.ok) {
      const profile = await res.json();
      if (profile.role === 'student') {
        window.location.replace('/#my-courses');
      } else if (profile.role === 'admin' && !IS_EMBEDDED) {
        // 在 iframe 內就不跳 shell（避免套娃），補 embedded 重整
        if (window.self !== window.top) {
          const u = new URL(window.location.href);
          u.searchParams.set('embedded', '1');
          window.location.replace(u.toString());
        } else {
          window.location.replace('/admin-shell.html#courses');
        }
      }
    } else if (!IS_EMBEDDED) {
      window.location.replace('login.html');
    }
  })();
</script>

  <nav class="navbar">
    <div class="navbar-logo"><span>AL</span> AdaptLearn</div>
    <ul class="navbar-links">
      <li><a href="index.html">首頁</a></li>
      <li><a href="courses.html">課程</a></li>
      <li><a href="/">學習中心</a></li>
    </ul>
    <div class="navbar-right" id="nav-right"></div>
  </nav>

  <div class="section" style="padding-top:48px">
    <div class="section-label">COURSES</div>
    <h1 class="section-title">所有課程</h1>

    <!-- 篩選 -->
    <div style="display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap">
      <button class="btn btn-primary filter-btn" data-filter="all">全部</button>
      <button class="btn btn-outline filter-btn" data-filter="beginner">初級</button>
      <button class="btn btn-outline filter-btn" data-filter="intermediate">中級</button>
      <button class="btn btn-outline filter-btn" data-filter="advanced">進階</button>
    </div>

    <div class="card-grid" id="course-list">
      <div class="skeleton" style="height:220px;border-radius:16px"></div>
      <div class="skeleton" style="height:220px;border-radius:16px"></div>
      <div class="skeleton" style="height:220px;border-radius:16px"></div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 AdaptLearn</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    let allCourses = [];
    const diffMap = { beginner: '初級', intermediate: '中級', advanced: '進階' };

    function renderCourses(courses) {
      const grid = document.getElementById('course-list');
      if (!courses.length) { grid.innerHTML = '<p style="color:#aaa">無符合條件的課程</p>'; return; }
      const sfx = IS_EMBEDDED ? '&embedded=1' : '';
      grid.innerHTML = courses.map(c => `
        <a class="card course-link-card" href="course-detail.html?id=${c.id}${sfx}"
           style="text-decoration:none;color:inherit;cursor:pointer;display:block">
          <div class="card-img" style="background:var(--color-gray);display:flex;align-items:center;justify-content:center;font-size:3rem">📘</div>
          <div class="card-body">
            <span class="card-tag">${escapeHtml(diffMap[c.difficulty] || c.difficulty)}</span>
            <div class="card-title">${escapeHtml(c.title)}</div>
            <div class="card-desc">${escapeHtml(c.description?.slice(0,80) || '')}...</div>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:0.8rem;color:#aaa">${c.lesson_count} 個單元</span>
              <span class="btn btn-primary" style="font-size:0.85rem;padding:8px 18px;pointer-events:none">
                查看單元 →
              </span>
            </div>
          </div>
        </a>
      `).join('');
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => {
          b.className = 'btn btn-outline filter-btn';
        });
        btn.className = 'btn btn-primary filter-btn';
        const f = btn.dataset.filter;
        renderCourses(f === 'all' ? allCourses : allCourses.filter(c => c.difficulty === f));
      });
    });

    CoursesAPI.list().then(data => {
      allCourses = data.results || data;
      renderCourses(allCourses);
    });
  </script>
</body>
</html>
